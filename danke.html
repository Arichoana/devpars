<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Danke! — DevPars</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/css/fonts.css">
<link rel="stylesheet" href="assets/css/styles.css">
<style>
  .thanks{ min-height:80vh; display:grid; place-items:center; text-align:center; padding:60px 22px; }
  .thanks .badge{ width:84px; height:84px; border-radius:50%; background:var(--brand-50); color:var(--brand-600);
    display:grid; place-items:center; margin:0 auto 22px; }

</style>

<body>
<div class="container thanks">
  <div>
    <div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h1><span data-lang="de">Vielen Dank!</span><span data-lang="en">Thank you!</span><span data-lang="fa">ممنون!</span></h1>

    <a href="index.html" class="btn btn-primary btn-lg" style="margin-top:18px"><span data-lang="de">Zurück zur Startseite</span><span data-lang="en">Back to home</span><span data-lang="fa">بازگشت به خانه</span></a>
  </div>
</div>
<script src="assets/js/app.js"></script>

</html>
