<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34b1a7"/>
      <stop offset="0.55" stop-color="#2ea69d"/>
      <stop offset="1" stop-color="#1d6e69"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#4cc1b8" stop-opacity="0.85"/>
      <stop offset="0.6" stop-color="#34b1a7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#194a47" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0c302e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#glow)"/>

  <!-- Subtle inner ring for depth (inside safe circle) -->
  <circle cx="512" cy="512" r="372" fill="none" stroke="url(#ring)" stroke-width="3"/>

  <!-- Monogram </> centered upper-area -->
  <g fill="none" stroke="#ffffff" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <!-- Left chevron: 24x24 "M8 7l-5 5 5 5" scaled ~ x34 -->
    <path d="M384 380 L290 462 L384 544"/>
    <!-- Right chevron: "M16 7l5 5-5 5" -->
    <path d="M640 380 L734 462 L640 544"/>
    <!-- Center slash -->
    <path d="M556 350 L468 574"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="690" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="124" font-weight="600" letter-spacing="2"
        fill="#ffffff">DevPars</text>
</svg>