<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2ea69d"/>
      <stop offset="1" stop-color="#4cc1b8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.28" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.56" r="0.62">
      <stop offset="0.62" stop-color="#194a47" stop-opacity="0"/>
      <stop offset="1" stop-color="#194a47" stop-opacity="0.30"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="320" y1="360" x2="704" y2="664" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eafbf8"/>
    </linearGradient>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#103d3a" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Full-bleed background -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <!-- Soft top-left highlight -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#glow)"/>
  <!-- Gentle inner vignette for depth -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#vignette)"/>

  <!-- Subtle concentric ring -->
  <circle cx="512" cy="512" r="372" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

  <!-- Code-bracket monogram "</>" centered, bold, rounded -->
  <g fill="none" stroke="url(#markGrad)" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" filter="url(#markShadow)">
    <!-- left chevron -->
    <path d="M392 372 L268 512 L392 652"/>
    <!-- right chevron -->
    <path d="M632 372 L756 512 L632 652"/>
    <!-- central slash -->
    <path d="M566 340 L458 684"/>
  </g>
</svg>