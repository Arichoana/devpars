<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ea69d"/>
      <stop offset="0.55" stop-color="#3bb4ab"/>
      <stop offset="1" stop-color="#4cc1b8"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0c302e" stop-opacity="0.42"/>
    </radialGradient>
    <radialGradient id="disc" cx="0.5" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#eaf7f5" stop-opacity="0.72"/>
    </radialGradient>
    <radialGradient id="discGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.78" stop-color="#194a47" stop-opacity="0"/>
      <stop offset="1" stop-color="#194a47" stop-opacity="0.22"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d6e69"/>
      <stop offset="1" stop-color="#2ea69d"/>
    </linearGradient>
    <pattern id="grid" width="128" height="128" patternUnits="userSpaceOnUse" patternTransform="rotate(45 512 512)">
      <path d="M0 0H128M0 0V128" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
    </pattern>
    <filter id="discShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0c302e" flood-opacity="0.35"/>
    </filter>
    <filter id="markShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#194a47" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#grid)"/>

  <!-- faint background chevron motif -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 250l-46 46 46 46"/>
    <path d="M250 250l46 46-46 46"/>
    <path d="M790 700l-46 46 46 46"/>
    <path d="M860 700l46 46-46 46"/>
    <path d="M760 210l-40 40 40 40"/>
    <path d="M210 760l-40 40 40 40"/>
  </g>

  <rect x="0" y="0" width="1024" height="1024" fill="url(#vignette)"/>

  <!-- central glassy disc -->
  <g filter="url(#discShadow)">
    <circle cx="512" cy="512" r="300" fill="url(#disc)"/>
  </g>
  <circle cx="512" cy="512" r="300" fill="url(#discGlow)"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3"/>
  <circle cx="512" cy="512" r="288" fill="none" stroke="#2ea69d" stroke-opacity="0.18" stroke-width="2"/>
  <!-- top sheen -->
  <path d="M512 212a300 300 0 0 1 212 88a300 300 0 0 0 -424 0a300 300 0 0 1 212 -88z" fill="url(#sheen)" opacity="0.5"/>

  <!-- code-bracket monogram </>  (24x24 geometry scaled & centered) -->
  <g transform="translate(512 512) scale(20.5) translate(-12 -12)"
     fill="none" stroke="url(#mark)" stroke-width="2.4"
     stroke-linecap="round" stroke-linejoin="round" filter="url(#markShadow)">
    <path d="M8 7l-5 5 5 5"/>
    <path d="M16 7l5 5-5 5"/>
    <!-- central slash -->
    <path d="M13.4 6l-2.8 12" stroke-width="2.1"/>
  </g>
</svg>