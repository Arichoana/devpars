<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eafbf8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4cc1b8"/>
      <stop offset="0.55" stop-color="#2ea69d"/>
      <stop offset="1" stop-color="#1d6e69"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="34" flood-color="#194a47" flood-opacity="0.34"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#194a47" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- background fills the square edge to edge -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- centered rounded-square app tile inside the safe circle -->
  <g filter="url(#shadow)">
    <rect x="247" y="247" width="530" height="530" rx="118" fill="url(#tile)"/>
    <!-- top sheen for premium glassy feel -->
    <rect x="247" y="247" width="530" height="530" rx="118" fill="url(#sheen)"/>
    <!-- subtle inner highlight ring -->
    <rect x="259" y="259" width="506" height="506" rx="108" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
  </g>

  <!-- bold white </> monogram, perfectly centered -->
  <g filter="url(#softGlow)" fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    <!-- left chevron -->
    <path d="M438 432 L356 512 L438 592"/>
    <!-- right chevron -->
    <path d="M586 432 L668 512 L586 592"/>
    <!-- center slash -->
    <path d="M540 410 L484 614"/>
  </g>
</svg>