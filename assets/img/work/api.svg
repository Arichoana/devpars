<svg viewBox="0 0 1200 860" width="1200" height="860" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111c33"/>
      <stop offset="1" stop-color="#0e1830"/>
    </linearGradient>
    <linearGradient id="tealbtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#14b8a6" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- page background -->
  <rect x="0" y="0" width="1200" height="860" fill="url(#bg)"/>

  <!-- ===== TOP BAR ===== -->
  <rect x="0" y="0" width="1200" height="64" fill="url(#topbar)"/>
  <rect x="0" y="63" width="1200" height="1" fill="#1e2d4d"/>

  <!-- logo + title -->
  <g transform="translate(28,18)">
    <rect x="0" y="0" width="28" height="28" rx="8" fill="url(#logoG)"/>
    <path d="M7 14 L12 9 M12 9 L12 19 M16 9 L21 14 L16 19" stroke="#04201d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="68" y="37" font-size="18" font-weight="700" fill="#e7eefc">LagerLink API</text>
  <rect x="195" y="22" width="44" height="20" rx="10" fill="#14b8a620" stroke="#14b8a6" stroke-width="1"/>
  <text x="217" y="36" font-size="12" font-weight="600" fill="#2dd4bf" text-anchor="middle">v2.1</text>

  <!-- server dropdown -->
  <rect x="788" y="16" width="282" height="32" rx="8" fill="#0b1428" stroke="#26324f" stroke-width="1"/>
  <circle cx="806" cy="32" r="3.5" fill="#34d399"/>
  <text x="818" y="36" font-size="13" fill="#aebbd6" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">https://api.lagerlink.io</text>
  <path d="M1052 29 l5 5 l5 -5" stroke="#6b7a9c" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- authorize button -->
  <rect x="1082" y="16" width="118" height="32" rx="8" fill="url(#tealbtn)" filter="url(#glow)"/>
  <path d="M1100 31 v-3 a4 4 0 0 1 8 0 v3 M1098 31 h12 v8 h-12 z" stroke="#04201d" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1150" y="36" font-size="13" font-weight="700" fill="#04201d" text-anchor="middle">Authorize</text>

  <!-- ===== LEFT SIDEBAR ===== -->
  <rect x="0" y="64" width="232" height="796" fill="#0c1426"/>
  <rect x="231" y="64" width="1" height="796" fill="#1a2741"/>
  <text x="28" y="100" font-size="11" font-weight="700" fill="#566388" letter-spacing="1.5">TAGS</text>

  <g font-size="14">
    <!-- Products (active) -->
    <rect x="16" y="116" width="200" height="38" rx="9" fill="#14b8a615"/>
    <rect x="16" y="116" width="3" height="38" rx="1.5" fill="#2dd4bf"/>
    <path d="M36 127 l8 -4 l8 4 v8 l-8 4 l-8 -4 z M36 127 l8 4 l8 -4 M44 131 v9" stroke="#2dd4bf" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="140" fill="#d7e2f7" font-weight="600">Products</text>

    <path d="M36 169 h6 v4 h-6 z M44 169 h6 v4 h-6 z M36 177 h6 v4 h-6 z M44 177 h6 v4 h-6 z" stroke="#7d8bad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="178" fill="#9aa7c6">Stock</text>

    <path d="M37 206 h12 l-1.5 9 h-9 z M40 206 v-3 a3 3 0 0 1 6 0 v3" stroke="#7d8bad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="216" fill="#9aa7c6">Orders</text>

    <path d="M35 252 l8 -5 l8 5 v6 h-16 z M39 258 v-5 h8 v5" stroke="#7d8bad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="254" fill="#9aa7c6">Warehouses</text>

    <path d="M37 288 a6 6 0 0 1 12 0 M40 291 a3 3 0 0 1 6 0 M43 294 v0.5" stroke="#7d8bad" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="43" cy="294" r="1.2" fill="#7d8bad"/>
    <text x="62" y="292" fill="#9aa7c6">Webhooks</text>
  </g>

  <!-- sidebar footer mini -->
  <rect x="16" y="800" width="200" height="40" rx="9" fill="#0b1326" stroke="#1a2741" stroke-width="1"/>
  <circle cx="36" cy="820" r="9" fill="#14b8a625"/>
  <path d="M32 820 a4 4 0 0 1 8 0 M33 817 a3 3 0 0 1 6 0" stroke="#2dd4bf" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <text x="54" y="817" font-size="12" font-weight="600" fill="#c2cee8">dev@lagerlink.io</text>
  <text x="54" y="830" font-size="10.5" fill="#5f6e92">Bearer-Token aktiv</text>

  <!-- ===== MAIN COLUMN ===== -->
  <!-- page heading -->
  <text x="264" y="106" font-size="26" font-weight="800" fill="#eaf1ff">Products</text>
  <text x="264" y="130" font-size="13.5" fill="#8593b4">Verwaltung von Produktkatalog, Lagerbestand und Bestellungen über REST.</text>

  <!-- right info chip -->
  <rect x="940" y="84" width="232" height="56" rx="12" fill="#0e1a31" stroke="#23314f" stroke-width="1"/>
  <path d="M958 104 v-3 a4 4 0 0 1 8 0 v3 M956 104 h12 v9 h-12 z" stroke="#2dd4bf" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="980" y="104" font-size="11" font-weight="700" fill="#7e8db0">AUTHENTIFIZIERUNG</text>
  <text x="980" y="123" font-size="12.5" fill="#cdd9f1">API-Key · <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#2dd4bf">X-Api-Key</tspan></text>

  <!-- ENDPOINT ROWS -->
  <!-- GET products -->
  <g transform="translate(264,160)">
    <rect x="0" y="0" width="908" height="48" rx="10" fill="#0e1f1c" stroke="#16352f" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="48" rx="2" fill="#22c55e"/>
    <rect x="16" y="13" width="58" height="22" rx="6" fill="#22c55e"/>
    <text x="45" y="28" font-size="12" font-weight="800" fill="#04210f" text-anchor="middle">GET</text>
    <text x="92" y="29" font-size="14" fill="#dbe6fb" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">/api/v2/products</text>
    <text x="320" y="29" font-size="13.5" fill="#8a99ba">Liste aller Produkte</text>
    <path d="M884 19 l5 5 l5 -5" stroke="#5d6c8e" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- POST orders -->
  <g transform="translate(264,220)">
    <rect x="0" y="0" width="908" height="48" rx="10" fill="#0d1828" stroke="#1b2c47" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="48" rx="2" fill="#3b82f6"/>
    <rect x="16" y="13" width="62" height="22" rx="6" fill="#3b82f6"/>
    <text x="47" y="28" font-size="12" font-weight="800" fill="#06182f" text-anchor="middle">POST</text>
    <text x="96" y="29" font-size="14" fill="#dbe6fb" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">/api/v2/orders</text>
    <text x="320" y="29" font-size="13.5" fill="#8a99ba">Neue Bestellung anlegen</text>
    <path d="M884 19 l5 5 l5 -5" stroke="#5d6c8e" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- GET stock {sku} EXPANDED -->
  <g transform="translate(264,280)">
    <rect x="0" y="0" width="908" height="300" rx="12" fill="#0c1c1a" stroke="#1c453c" stroke-width="1.4" filter="url(#soft)"/>
    <rect x="0" y="0" width="4" height="300" rx="2" fill="#22c55e"/>
    <!-- header -->
    <rect x="16" y="13" width="58" height="22" rx="6" fill="#22c55e"/>
    <text x="45" y="28" font-size="12" font-weight="800" fill="#04210f" text-anchor="middle">GET</text>
    <text x="92" y="29" font-size="14" fill="#dbe6fb" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">/api/v2/stock/{sku}</text>
    <text x="330" y="29" font-size="13.5" fill="#8a99ba">Aktueller Lagerbestand</text>
    <path d="M884 26 l5 -5 l5 5" stroke="#5d6c8e" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="16" y="48" width="876" height="1" fill="#16302b"/>

    <!-- params + try it -->
    <text x="20" y="72" font-size="11" font-weight="700" fill="#5f7d72" letter-spacing="1">PARAMETER</text>
    <text x="20" y="94" font-size="13" fill="#9fc7b9" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">sku</text>
    <rect x="56" y="83" width="58" height="16" rx="4" fill="#1c2a44"/>
    <text x="85" y="95" font-size="9.5" fill="#9bb0d6" text-anchor="middle">string · path</text>
    <text x="128" y="94" font-size="12.5" fill="#7d8caf">Eindeutige Artikelnummer (SKU)</text>

    <rect x="784" y="60" width="108" height="32" rx="8" fill="url(#tealbtn)"/>
    <path d="M806 76 l-5 -3 v6 z M803 76 h-2" stroke="#04201d" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="848" y="80" font-size="12.5" font-weight="700" fill="#04201d" text-anchor="middle">Try it out</text>

    <!-- response label -->
    <g transform="translate(20,112)">
      <rect x="0" y="0" width="40" height="20" rx="5" fill="#14331f"/>
      <text x="20" y="14" font-size="11" font-weight="800" fill="#34d399" text-anchor="middle">200</text>
      <text x="50" y="14" font-size="12.5" fill="#8a99ba">OK · application/json</text>
    </g>

    <!-- JSON code panel -->
    <rect x="20" y="142" width="872" height="142" rx="9" fill="#070f1d" stroke="#172439" stroke-width="1"/>
    <rect x="20" y="142" width="872" height="26" rx="9" fill="#0c1526"/>
    <rect x="20" y="158" width="872" height="10" fill="#0c1526"/>
    <circle cx="34" cy="155" r="3.5" fill="#ef4444"/>
    <circle cx="46" cy="155" r="3.5" fill="#f59e0b"/>
    <circle cx="58" cy="155" r="3.5" fill="#22c55e"/>
    <text x="78" y="159" font-size="11" fill="#566388" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">response.json</text>

    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5">
      <text x="38" y="188" fill="#7f8fb3">{</text>
      <text x="54" y="206" fill="#5eead4">"sku":</text><text x="118" y="206" fill="#fcd34d">"SAF-NEG-5G"</text><text x="206" y="206" fill="#7f8fb3">,</text>
      <text x="54" y="224" fill="#5eead4">"name":</text><text x="126" y="224" fill="#fcd34d">"Safran Negin 5g"</text><text x="252" y="224" fill="#7f8fb3">,</text>
      <text x="54" y="242" fill="#5eead4">"onHand":</text><text x="138" y="242" fill="#93c5fd">142</text><text x="166" y="242" fill="#7f8fb3">,</text>
      <text x="280" y="242" fill="#5eead4">"reserved":</text><text x="378" y="242" fill="#93c5fd">12</text><text x="398" y="242" fill="#7f8fb3">,</text>
      <text x="540" y="242" fill="#5eead4">"available":</text><text x="646" y="242" fill="#93c5fd">130</text><text x="674" y="242" fill="#7f8fb3">,</text>
      <text x="54" y="260" fill="#5eead4">"reorderLevel":</text><text x="190" y="260" fill="#93c5fd">50</text><text x="210" y="260" fill="#7f8fb3">,</text>
      <text x="280" y="260" fill="#5eead4">"warehouse":</text><text x="386" y="260" fill="#fcd34d">"Essen-Nord"</text>
      <text x="38" y="278" fill="#7f8fb3">}</text>
    </g>
  </g>

  <!-- PUT stock {sku} -->
  <g transform="translate(264,592)">
    <rect x="0" y="0" width="908" height="48" rx="10" fill="#1f1607" stroke="#3d2c11" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="48" rx="2" fill="#f59e0b"/>
    <rect x="16" y="13" width="58" height="22" rx="6" fill="#f59e0b"/>
    <text x="45" y="28" font-size="12" font-weight="800" fill="#241402" text-anchor="middle">PUT</text>
    <text x="92" y="29" font-size="14" fill="#dbe6fb" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">/api/v2/stock/{sku}</text>
    <text x="330" y="29" font-size="13.5" fill="#8a99ba">Bestand anpassen</text>
    <path d="M884 19 l5 5 l5 -5" stroke="#5d6c8e" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- DELETE products {id} -->
  <g transform="translate(264,652)">
    <rect x="0" y="0" width="908" height="48" rx="10" fill="#23100f" stroke="#481c1a" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="48" rx="2" fill="#ef4444"/>
    <rect x="16" y="13" width="74" height="22" rx="6" fill="#ef4444"/>
    <text x="53" y="28" font-size="12" font-weight="800" fill="#2a0808" text-anchor="middle">DELETE</text>
    <text x="108" y="29" font-size="14" fill="#dbe6fb" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">/api/v2/products/{id}</text>
    <text x="360" y="29" font-size="13.5" fill="#8a99ba">Produkt löschen</text>
    <path d="M884 19 l5 5 l5 -5" stroke="#5d6c8e" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== FOOTER ===== -->
  <rect x="232" y="724" width="940" height="1" fill="#1a2741"/>
  <g transform="translate(264,742)">
    <path d="M2 10 a8 8 0 1 1 16 0 a8 8 0 0 1 -16 0 M6 10 h8 M10 6 v8" stroke="#3a4straight" stroke-width="1.4" fill="none"/>
  </g>
  <circle cx="274" cy="752" r="7" fill="none" stroke="#475569" stroke-width="1.4"/>
  <path d="M274 748 v8 M270 752 h8" stroke="#475569" stroke-width="1.4" stroke-linecap="round"/>
  <text x="290" y="757" font-size="12.5" fill="#6b7a9c" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">Powered by .NET 8 · OpenAPI 3.0</text>
  <text x="1172" y="757" font-size="12" fill="#475569" text-anchor="end">© 2026 LagerLink GmbH · Essen</text>
</svg>