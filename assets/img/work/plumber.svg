  <text x="918" y="782" fill="#1E5BC6" font-size="12.5" font-weight="600">hochladen</text>

  <!-- field: PLZ + next button -->
  <text x="1019" y="752" fill="#6b7793" font-size="11.5" font-weight="600">PLZ</text>
  <rect x="1019" y="758" width="93" height="38" rx="9" fill="#ffffff" stroke="#d3dbe8" stroke-width="1"/>
  <text x="1033" y="782" fill="#3b4a66" font-size="13.5">44135</text>

  <!-- ===== navy footer ===== -->
