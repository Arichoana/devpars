  <g transform="translate(74,66)" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14,3 a4.5,4.5 0 0 0 -6,5.6 l-6.5,6.5 a1.6,1.6 0 0 0 2.3,2.3 l6.5,-6.5 A4.5,4.5 0 0 0 16,4 l-2.6,2.6 -1.9,-0.5 -0.5,-1.9 z"/>
