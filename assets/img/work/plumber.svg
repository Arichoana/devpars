  <text x="64" y="843" fill="#cdd8ee" font-size="12.5">Meisterbetrieb Krüger · Hafenstraße 24, 44135 Dortmund · Tel. 0231 / 99 88 77</text>
  <text x="980" y="843" fill="#9fb2d6" font-size="12.5">Impressum</text>
  <text x="1064" y="843" fill="#9fb2d6" font-size="12.5">Datenschutz</text>
  <circle cx="1052" cy="839" r="1.5" fill="#5e76a4"/>
