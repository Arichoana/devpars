      <path d="M9,0 l2.5,5.2 5.7,0.7 -4.2,3.9 1.1,5.6 -5.1,-2.8 -5.1,2.8 1.1,-5.6 -4.2,-3.9 5.7,-0.7 z" transform="translate(17.5,0) scale(0.62)"/>
      <path d="M9,0 l2.5,5.2 5.7,0.7 -4.2,3.9 1.1,5.6 -5.1,-2.8 -5.1,2.8 1.1,-5.6 -4.2,-3.9 5.7,-0.7 z" transform="translate(35,0) scale(0.62)"/>
      <path d="M9,0 l2.5,5.2 5.7,0.7 -4.2,3.9 1.1,5.6 -5.1,-2.8 -5.1,2.8 1.1,-5.6 -4.2,-3.9 5.7,-0.7 z" transform="translate(52.5,0) scale(0.62)"/>
      <path d="M9,0 l2.5,5.2 5.7,0.7 -4.2,3.9 1.1,5.6 -5.1,-2.8 -5.1,2.8 1.1,-5.6 -4.2,-3.9 5.7,-0.7 z" transform="translate(70,0) scale(0.62)"/>
