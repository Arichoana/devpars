  <text x="560" y="23" fill="#cfe0ff" font-size="13.5" font-weight="500">24h-Notdienst:</text>
  <text x="665" y="23" fill="#ffffff" font-size="13.5" font-weight="700" letter-spacing="0.3">0231 / 99 88 77</text>

  <!-- ===== header ===== -->
