  <g transform="translate(420,18)" stroke="#ffffff" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,-6 a2.2,2.2 0 0 1 2.2,-2.2 h2 a1.5,1.5 0 0 1 1.5,1.2 l0.5,2.4 a1.5,1.5 0 0 1 -0.5,1.5 l-1,0.9 a9,9 0 0 0 4.2,4.2 l0.9,-1 a1.5,1.5 0 0 1 1.5,-0.5 l2.4,0.5 a1.5,1.5 0 0 1 1.2,1.5 v2 a2.2,2.2 0 0 1 -2.2,2.2 A15,15 0 0 1 0,-6 z"/>
  </g>
