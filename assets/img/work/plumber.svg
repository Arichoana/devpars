  <text x="682" y="782" fill="#9aa6bd" font-size="13.5">Kurz beschreiben…</text>

  <!-- field: Foto hochladen -->
  <text x="883" y="752" fill="#6b7793" font-size="11.5" font-weight="600">FOTO</text>
  <rect x="883" y="758" width="120" height="38" rx="9" fill="#ffffff" stroke="#aebfe0" stroke-width="1.2" stroke-dasharray="4 3"/>
  <g transform="translate(897,769)" stroke="#1E5BC6" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
