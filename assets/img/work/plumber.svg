<svg viewBox="0 0 1200 860" width="1200" height="860" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E5BC6"/>
      <stop offset="1" stop-color="#0E3C8C"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142a52"/>
      <stop offset="1" stop-color="#0e2143"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a6fe0"/>
      <stop offset="1" stop-color="#1E5BC6"/>
